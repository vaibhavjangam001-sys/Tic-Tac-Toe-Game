<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Game</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>
    <header class="Header">
        <div class="small-header"> 
            <h1 id="game-heading">Tic Tac Toe Game</h1>
        </div>
    </header>
    <container>
        <div class="main-box"id="start-box">
            <div id="game-start-or-reset-box">
                <div id="Player-detail-X">
                    <h1 class="player-name">Player :- X</h1>
                    <div id="Chance-indicator-X"></div>
                </div>
                <div id="Player-detail-O">
                    <h1 class="player-name">Player :- O</h1>
                    <div id="Chance-indicator-O"></div>
                </div>
                <button id="Reset-btn"><h1 id="Reset-btn-text">Reset</h1></button>
            </div>
        </div>
        <div  id="game-box-middle">
            <div class="hide" id="Winning-msg">
                <div id="Winner-Text"><h1 id="winner-h1">Winner</h1></div>
                <div  id="Trophy">
                    <img id="Image" src="3539629.jpg" alt="">
                </div>
                <div id="Winner-player"><h1 id="winner-player-h1">Winner</h1></div>
                <button id="btn-new-game"><h1 id="btn-new-game-text">New Game</h1></button>

            </div>
            <button class="Box ani-box">x</button>
            <button class="Box ani-box">x</button>
            <button class="Box ani-box">x</button>
            <button class="Box ani-box">x</button>
            <button class="Box ani-box">x</button>
            <button class="Box ani-box">x</button>
            <button class="Box ani-box">x</button>
            <button class="Box ani-box">x</button>
            <button class="Box ani-box">x</button>
        </div>
        <div class="main-box id="end-box"></div>
    </container>
</body>
<script src="home.js"></script>
</html>
